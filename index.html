<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechWave</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-[#170B2D] text-white">
    <!-- ================= NAVBAR ================= -->

    <header class="border-b border-[#4d4164]">
        <div class="max-w-7xl mx-auto px-6">

            <nav class="flex justify-between items-center h-20">

                <!-- Logo -->
                <h1 class="text-4xl font-extrabold">
                    <span>Tech</span>
                    <span
                        class="bg-gradient-to-r from-pink-500 via-fuchsia-500 to-purple-500 bg-clip-text text-transparent">
                        Wave
                    </span>
                </h1>

                <!-- Menu -->
                <ul class="hidden md:flex items-center gap-12">
                    <li><a class="hover:text-pink-400 duration-300" href="#">About</a></li>
                    <li><a class="hover:text-pink-400 duration-300" href="#">Episodes</a></li>
                    <li><a class="hover:text-pink-400 duration-300" href="#">Host</a></li>
                </ul>

                <!-- Button -->
                <button
                    class="rounded-full bg-gradient-to-r from-yellow-400 via-pink-500 to-purple-600 px-6 py-2 font-semibold shadow-lg transition duration-300 hover:scale-105">
                    Subscribe →
                </button>

            </nav>

        </div>
    </header>

    <!-- ================= HERO SECTION ================= -->

    <section class="relative overflow-hidden py-20">

        <!-- BACKGROUND Image -->
        <div class="absolute inset-0">
            <img src="./assets/hero-bg.png" alt="wave" class="w-full h-full object-cover">
        </div>

        <!-- CONTENT -->
        <div class="relative z-10 max-w-7xl mx-auto px-6 text-center">

           
            <!-- Text -->
            <h1 class="mt-10 text-6xl font-extrabold">
                TechWave
            </h1>

            <p class="mt-4 max-w-2xl mx-auto text-lg text-slate-300">
                Your daily dose of tech insights, productivity hacks, and personal growth.
            </p>

            <!-- Buttons -->
            <div class="mt-8 flex justify-center gap-5">

                <!-- Spotify Button -->
                <a href="#"
                    class="flex items-center gap-2 rounded-full bg-gradient-to-r from-yellow-400 via-pink-500 to-purple-600 px-8 py-3 font-semibold transition duration-300 hover:scale-105">

                    <img src="./assets/spotify.png" alt="spotify" class="w-[16.67px] h-[16.67px]">

                    <span>Listen On Spotify</span>
                </a>

                <!-- Subscribe Button -->
                <a href="#"
                    class="flex items-center gap-2 rounded-full border border-cyan-400 px-8 py-3 font-semibold text-cyan-300 transition duration-300 hover:bg-cyan-400 hover:text-black">

                    <img src="./assets/message.png" alt="subscribe" class="w-[20px] h-[20px]">

                    <span>Subscribe</span>
                </a>

            </div>

        </div>

    </section>

</body>

</html>
